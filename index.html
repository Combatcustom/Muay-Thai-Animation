<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Floating Patch Test</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            color: #fff;
        }
        model-viewer {
            width: 100vw;
            height: 85vh;
        }
        .controls {
            padding: 16px;
            text-align: center;
        }
        input[type="file"] {
            color: #fff;
        }

        /* This controls the patch styling */
        .floating-patch-container {
            display: none; /* Hidden until upload */
            pointer-events: none; /* Stops the patch from blocking camera rotations */
        }

        .floating-patch-container img {
            width: 90px; /* Adjust this number to make the logo bigger or smaller */
            height: auto;
            /* Gives it a solid, crisp look with a subtle shadow to make it look 3D raised */
            filter: drop-shadow(0px 3px 3px rgba(0, 0, 0, 0.7));
            transform: translate(-50%, -50%); /* Centers it perfectly on the coordinate anchor */
        }
    </style>
</head>
<body>

    <model-viewer
        id="viewer"
        src="MT_SHORTS.glb"
        alt="Patch test model"
        camera-controls
        auto-rotate
        rotation-per-second="-35deg"
        exposure="1.2"
        shadow-intensity="1">

        <div id="patchHotspot" class="floating-patch-container" slot="hotspot-crotch" data-position="0m 0.961m 0.115m" data-normal="0m 0m 1m">
            <img id="patchPreview" src="" alt="Custom User Patch">
        </div>

    </model-viewer>

    <div class="controls">
        <label for="patchUpload">Upload a transparent PNG to apply as a patch:</label><br><br>
        <input type="file" id="patchUpload" accept="image/png">
    </div>

    <script>
        const fileInput = document.querySelector("#patchUpload");
        const patchContainer = document.querySelector("#patchHotspot");
        const patchImage = document.querySelector("#patchPreview");

        fileInput.addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Create a clear local URL for the uploaded graphic file
            const imageUrl = URL.createObjectURL(file);

            // Stick the image directly into our floating hotspot layer
            patchImage.src = imageUrl;
            patchContainer.style.display = "block"; // Make it visible instantly
        });
    </script>
</body>
</html>
