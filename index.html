<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Floating Patch Test</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            color: #fff;
        }
        model-viewer {
            width: 100vw;
            height: 85vh;
        }
        .controls {
            padding: 16px;
            text-align: center;
        }
        input[type="file"] {
            color: #fff;
        }

        /* CSS styling that handles the patch appearance */
        .floating-patch-container {
            display: none; /* Hidden until a file is uploaded */
            pointer-events: none; /* Stops the image overlay from blocking mouse controls */
        }

        .floating-patch-container img {
            width: 90px; /* Adjust this number to scale your patch larger or smaller */
            height: auto;
            /* Creates a shadow underneath the image so it pops out from the fabric */
            filter: drop-shadow(0px 3px 3px rgba(0, 0, 0, 0.75));
            transform: translate(-50%, -50%); /* Keeps the logo perfectly centered on the coordinate point */
        }
    </style>
</head>
<body>

    <model-viewer
        id="viewer"
        src="MT_SHORTS.glb"
        alt="Patch test model"
        camera-controls
        auto-rotate
        rotation-per-second="-35deg"
        exposure="1.2"
        shadow-intensity="1">

        <div id="patchHotspot" class="floating-patch-container" slot="hotspot-crotch" data-position="0m 0.46m -0.25m" data-normal="0m 0m -1m">
            <img id="patchPreview" src="" alt="Custom User Patch">
        </div>

    </model-viewer>

    <div class="controls">
        <label for="patchUpload">Upload a transparent PNG to inject a floating patch:</label><br><br>
        <input type="file" id="patchUpload" accept="image/png">
    </div>

    <script>
        const fileInput = document.querySelector("#patchUpload");
        const patchContainer = document.querySelector("#patchHotspot");
        const patchImage = document.querySelector("#patchPreview");

        fileInput.addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Create local object reference link
            const imageUrl = URL.createObjectURL(file);

            // Force image source path update
            patchImage.src = imageUrl;
            
            // Set element visibility state to active
            patchContainer.style.display = "block"; 
        });
    </script>
</body>
</html>
