<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #3a3a3a 0%, #111111 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(-5%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

        id="shortsViewer" 
        src="MT_SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="-35deg"
        interaction-prompt="none"
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="1">
    </model-viewer>

        function safeColor(hexStr) {
            const clean = hexStr.trim().toLowerCase();
            if (clean === 'white') return [0.95, 0.95, 0.95, 1.0];
            if (clean === 'black') return [0.03, 0.03, 0.03, 1.0];
            
            const hex = clean.replace('#', '');
            if (hex.length !== 6) return [1.0, 1.0, 1.0, 1.0];
            
            const r = parseInt(hex.substring(0, 2), 16) / 255;
            const g = parseInt(hex.substring(2, 4), 16) / 255;
            const b = parseInt(hex.substring(4, 6), 16) / 255;

            return [Math.pow(r, 2.2), Math.pow(g, 2.2), Math.pow(b, 2.2), 1.0];
        }

            const clean = hexStr.trim().toLowerCase();
            if (clean === 'white') return '#f2f2f2';
            if (clean === 'black') return '#080808';
            return clean.startsWith('#') ? clean : '#' + clean;

.45433,0.82641],[0.4547,0.81158],[0.44307,0.81168]]},{"flat":[[-3.9822,-0.9324],[-2.2565,-1.0415],[-3.4465,-2.0052]],"uv":[[0.38745,0.83413],[0.40264,0.83255],[0.39204,0.82296]]},{"flat":[[-2.2565,-1.0415],[-1.7016,1.1148],[-1.1168,-1.4682]],"uv":[[0.40264,0.83255],[0.40794,0.85478],[0.41327,0.8284]]},{"flat":[[-1.1168,-1.4682],[-0.5223,1.4622],[0.2591,-0.6991]],"uv":[[0.41327,0.8284],[0.41815,0.85811],[0.42675,0.83638]]},{"flat":[[2.3967,1.3929],[1.2242,3.002],[2.1902,3.2865]],"uv":[[0.44392,0.85734],[0.43448,0.87407],[0.44255,0.87647]]},{"flat":[[-0.5223,1.4622],[-1.1168,-1.4682],[-1.7016,1.1148]],"uv":[[0.41815,0.85811],[0.41327,0.8284],[0.40794,0.85478]]},{"flat":[[-1.1168,-1.4682],[0.2591,-0.6991],[0.0014,-2.912]],"uv":[[0.41327,0.8284],[0.42675,0.83638],[0.42289,0.81315]]},{"flat":[[2.3967,1.3929],[2.9575,-0.0778],[0.5785,1.2625]],"uv":[[0.44392,0.85734],[0.45,0.84383],[0.42802,0.85585]]},{"flat":[[-1.7016,1.1148],[-1.3046,3.0015],[-0.5223,1.4622]],"uv":[[0.40794,0.85478],[0.41163,0.87428],[0.41815,0.85811]]},{"flat":[[0.5785,1.2625],[0.2591,-0.6991],[-0.5223,1.4622]],"uv":[[0.42802,0.85585],[0.42675,0.83638],[0.41815,0.85811]]},{"flat":[[-0.0109,3.0498],[-0.5223,1.4622],[-1.3046,3.0015]],"uv":[[0.42292,0.87454],[0.41815,0.85811],[0.41163,0.87428]]},{"flat":[[-1.7016,1.1148],[-2.724,0.8845],[-1.3046,3.0015]],"uv":[[0.40794,0.85478],[0.39934,0.85221],[0.41163,0.87428]]},{"flat":[[-0.0109,3.0498],[1.2242,3.002],[0.5785,1.2625]],"uv":[[0.42292,0.87454],[0.43448,0.87407],[0.42802,0.85585]]},{"flat":[[0.5785,1.2625],[2.2364,-1.2413],[0.2591,-0.6991]],"uv":[[0.42802,0.85585],[0.44486,0.8321],[0.42675,0.83638]]},{"flat":[[0.5785,1.2625],[2.9575,-0.0778],[2.2364,-1.2413]],"uv":[[0.42802,0.85585],[0.45,0.84383],[0.44486,0.8321]]},{"flat":[[0.5785,1.2625],[1.2242,3.002],[2.3967,1.3929]],"uv":[[0.42802,0.85585],[0.43448,0.87407],[0.44392,0.85734]]},{"flat":[[3.5354,-1.6316],[2.2364,-1.2413],[2.9575,-0.0778]],"uv":[[0.45433,0.82641],[0.44486,0.8321],[0.45,0.84383]]},{"flat":[[5.071,-0.7475],[6.1582,-1.9484],[4.9334,-2.0165]],"uv":[[0.468,0.83611],[0.47746,0.82386],[0.46703,0.82287]]},{"flat":[[2.2364,-1.2413],[2.2811,-3.085],[1.6806,-1.5199]],"uv":[[0.44486,0.8321],[0.44307,0.81168],[0.43837,0.82756]]},{"flat":[[4.4939,-0.2608],[3.5354,-1.6316],[2.9575,-0.0778]],"uv":[[0.46341,0.84085],[0.45433,0.82641],[0.45,0.84383]]},{"flat":[[4.9334,-2.0165],[4.4939,-0.2608],[5.071,-0.7475]],"uv":[[0.46703,0.82287],[0.46341,0.84085],[0.468,0.83611]]},{"flat":[[5.0612,3.1322],[5.0126,1.8881],[4.0797,0.859]],"uv":[[0.46789,0.8759],[0.46745,0.86296],[0.45786,0.85251]]},{"flat":[[2.9575,-0.0778],[4.0797,0.859],[4.4939,-0.2608]],"uv":[[0.45,0.84383],[0.45786,0.85251],[0.46341,0.84085]]},{"flat":[[4.0797,0.859],[5.0126,1.8881],[5.0792,0.8944]],"uv":[[0.45786,0.85251],[0.46745,0.86296],[0.46803,0.85307]]},{"flat":[[6.2982,0.4997],[5.0792,0.8944],[6.1553,1.6896]],"uv":[[0.47866,0.84929],[0.46803,0.85307],[0.47725,0.86089]]},{"flat":[[5.0792,0.8944],[4.4939,-0.2608],[4.0797,0.859]],"uv":[[0.46803,0.85307],[0.46341,0.84085],[0.45786,0.85251]]},{"flat":[[4.9334,-2.0165],[3.5354,-1.6316],[4.4939,-0.2608]],"uv":[[0.46703,0.82287],[0.45433,0.82641],[0.46341,0.84085]]}];

        // Bounding box of the true undistorted flat shape (computed once)
        const FLAT_BOUNDS = (() => {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const t of TRI_DATA) {
                for (const [x, y] of t.flat) {
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
            return { minX, maxX, minY, maxY, width: maxX - minX, height: maxY - minY };
        })();

        // Resolution of the "design" canvas - drawn in true undistorted proportions
        const DESIGN_CANVAS_HEIGHT = 1200;
        const DESIGN_CANVAS_WIDTH = Math.round(DESIGN_CANVAS_HEIGHT * (FLAT_BOUNDS.width / FLAT_BOUNDS.height));

        function flatToDesignPx(x, y) {
            return [
                (x - FLAT_BOUNDS.minX) / FLAT_BOUNDS.width * DESIGN_CANVAS_WIDTH,
                (y - FLAT_BOUNDS.minY) / FLAT_BOUNDS.height * DESIGN_CANVAS_HEIGHT
            ];
        }

        // Build the clean, undistorted design (background + centered logo) in true proportions
        function buildDesignCanvas(bgHex, logoImg) {
            const canvas = document.createElement("canvas");
            canvas.width = DESIGN_CANVAS_WIDTH;
            canvas.height = DESIGN_CANVAS_HEIGHT;
            const ctx = canvas.getContext("2d");

            ctx.fillStyle = cssColor(bgHex);
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const padding = LOGO_FILL_RATIO;
            const maxW = canvas.width * padding;
            const maxH = canvas.height * padding;
            const scale = Math.min(maxW / logoImg.width, maxH / logoImg.height);
            const drawW = logoImg.width * scale;
            const drawH = logoImg.height * scale;
            const dx = (canvas.width - drawW) / 2;
            const dy = (canvas.height - drawH) / 2;

            ctx.drawImage(logoImg, dx, dy, drawW, drawH);
            return canvas;
        }

        // Compute the affine transform mapping 3 source points to 3 target points exactly
        function triangleAffine(s0, s1, s2, t0, t1, t2) {
            const dS1x = s1[0]-s0[0], dS1y = s1[1]-s0[1];
            const dS2x = s2[0]-s0[0], dS2y = s2[1]-s0[1];
            const dT1x = t1[0]-t0[0], dT1y = t1[1]-t0[1];
            const dT2x = t2[0]-t0[0], dT2y = t2[1]-t0[1];

            const det = dS1x*dS2y - dS2x*dS1y;
            if (Math.abs(det) < 1e-9) return null;

            const a = (dT1x*dS2y - dT2x*dS1y) / det;
            const c = (dT2x*dS1x - dT1x*dS2x) / det;
            const b = (dT1y*dS2y - dT2y*dS1y) / det;
            const d = (dT2y*dS1x - dT1y*dS2x) / det;
            const e = t0[0] - (a*s0[0] + c*s0[1]);
            const f = t0[1] - (b*s0[0] + d*s0[1]);
            return [a, b, c, d, e, f];
        }

        // Warp the clean design into actual UV/texture space, one triangle at a time,
        // so the mesh's natural per-triangle stretch is pre-compensated for.
        function warpDesignIntoUVSpace(designCanvas) {
            const canvas = document.createElement("canvas");
            canvas.width = LOGO_CANVAS_SIZE;
            canvas.height = LOGO_CANVAS_SIZE;
            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";

            for (const tri of TRI_DATA) {
                const s0 = flatToDesignPx(tri.flat[0][0], tri.flat[0][1]);
                const s1 = flatToDesignPx(tri.flat[1][0], tri.flat[1][1]);
                const s2 = flatToDesignPx(tri.flat[2][0], tri.flat[2][1]);

                const t0 = [tri.uv[0][0]*canvas.width, tri.uv[0][1]*canvas.height];
                const t1 = [tri.uv[1][0]*canvas.width, tri.uv[1][1]*canvas.height];
                const t2 = [tri.uv[2][0]*canvas.width, tri.uv[2][1]*canvas.height];

                const m = triangleAffine(s0, s1, s2, t0, t1, t2);
                if (!m) continue;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(t0[0], t0[1]);
                ctx.lineTo(t1[0], t1[1]);
                ctx.lineTo(t2[0], t2[1]);
                // Slightly expand the clip via line join to hide sub-pixel seams between triangles
                ctx.closePath();
                ctx.clip();
                ctx.setTransform(m[0], m[1], m[2], m[3], m[4], m[5]);
                ctx.drawImage(designCanvas, 0, 0);
                ctx.restore();
            }

            return canvas;
        }

        function buildLogoTextureDataURL(bgHex, logoImg) {
            const designCanvas = buildDesignCanvas(bgHex, logoImg);
            const finalCanvas = warpDesignIntoUVSpace(designCanvas);
            return finalCanvas.toDataURL("image/png");
        }

        let comboIndex = 0;
        let loopInterval = null;

        async function startColorLoop() {
            const materials = viewer.model.materials;
            const logoPanelMaterial = materials.find(m => m.name === "LogoPanel");

            // Preload the 4 unique logo images once
            const uniqueAssets = [...new Set(designCombos.map(c => c.logoAsset))];
            const imageCache = {};
            await Promise.all(uniqueAssets.map(async (assetKey) => {
                imageCache[assetKey] = await loadImage(LOGO_URLS[assetKey]);
            }));

            // Precompute AND pre-upload a GPU texture for every combo upfront, before
            // the rotation loop starts. Doing this live during playback (every 1.2s)
            // was causing the auto-rotate to visibly stutter/jump.
            for (const combo of designCombos) {
                const dataUrl = buildLogoTextureDataURL(combo.logoPanelHex, imageCache[combo.logoAsset]);
                combo.logoTexture = await viewer.createTexture(dataUrl);
            }

            // Set LogoPanel base params (full white factor so texture colors show unmodified)
            if (logoPanelMaterial) {
                logoPanelMaterial.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
                logoPanelMaterial.pbrMetallicRoughness.setRoughnessFactor(0.65);
                logoPanelMaterial.pbrMetallicRoughness.setMetallicFactor(0.15);
            }

            loopInterval = setInterval(() => {
                const current = designCombos[comboIndex];

                materials.forEach(material => {
                    const name = material.name;

                    if (name === "FrontLeftPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.frontLeft);
                    else if (name === "BackLeftPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.backLeft);
                    else if (name === "MidLeftPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.midLeft);
                    else if (name === "FrontRightPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.frontRight);
                    else if (name === "BackRightPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.backRight);
                    else if (name === "MidRightPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.midRight);
                    else if (name === "WaistBand") material.pbrMetallicRoughness.setBaseColorFactor(current.waistband);
                    else if (name === "Sidelines") material.pbrMetallicRoughness.setBaseColorFactor(current.sidelines);
                    else if (name === "BottomPiping") material.pbrMetallicRoughness.setBaseColorFactor(current.bottomPiping);
                    else if (name === "Stitching") material.pbrMetallicRoughness.setBaseColorFactor(current.stitching);
                    else if (name === "LogoPanel") {
                        // Just swap the already-uploaded texture reference - no GPU work here
                        material.pbrMetallicRoughness.baseColorTexture.setTexture(current.logoTexture);
                    }

                    // Re-enforces satin parameters continuously to stop plasticity/shininess
                    if (["FrontLeftPanel", "BackLeftPanel", "MidLeftPanel", "FrontRightPanel", "BackRightPanel", "MidRightPanel", "WaistBand", "Sidelines"].includes(name)) {
                        material.pbrMetallicRoughness.setRoughnessFactor(0.65); 
                        material.pbrMetallicRoughness.setMetallicFactor(0.15); 
                    }
                });

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 1371); // 15 combos across 2 full rotations (rotation = 360/35s ≈ 10.29s each)
        }

        if (viewer.loaded) {
            startColorLoop();
        } else {
            viewer.addEventListener("load", startColorLoop);
        }
