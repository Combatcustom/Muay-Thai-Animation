<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Floating Patch Test</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            color: #fff;
        }
        model-viewer {
            width: 100vw;
            height: 85vh;
        }
        .controls {
            padding: 16px;
            text-align: center;
        }
        input[type="file"] {
            color: #fff;
        }

        /* THE CHOSEN ILLUSION: CSS Styling for the injected floating patch */
        .floating-patch-container {
            display: none; /* Hidden by default until upload */
            pointer-events: none; /* Prevents the patch from blocking orbital mouse controls */
        }

        .floating-patch-container img {
            width: 90px; /* Adjust size of the patch here */
            height: auto;
            /* A subtle CSS drop-shadow sells the "raised off the fabric" 3D look */
            filter: drop-shadow(0px 3px 3px rgba(0, 0, 0, 0.65));
            transform: translate(-50%, -50%); /* Keeps it perfectly centered on the coordinate */
        }
    </style>
</head>
<body>

    <model-viewer
        id="viewer"
        src="MT_SHORTS.glb"
        alt="Patch test model"
        camera-controls
        auto-rotate
        rotation-per-second="-35deg"
        exposure="1.2"
        shadow-intensity="1">

        /* INJECTED TARGET: This hotspot maps to 3D space coordinates right on the front crotch seam */
        <div id="patchHotspot" class="floating-patch-container" slot="hotspot-crotch" data-position="0m 0.38m 0.16m" data-normal="0m 0m 1m">
            <img id="patchPreview" src="" alt="Custom User Patch">
        </div>

    </model-viewer>

    <div class="controls">
        <label for="patchUpload">Upload a transparent PNG to inject a floating patch:</label><br><br>
        <input type="file" id="patchUpload" accept="image/png">
    </div>

    <script>
        const fileInput = document.querySelector("#patchUpload");
        const patchContainer = document.querySelector("#patchHotspot");
        const patchImage = document.querySelector("#patchPreview");

        fileInput.addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Create a local URL for the uploaded image file
            const imageUrl = URL.createObjectURL(file);

            // Feed the image URL directly into our injected hotspot layer
            patchImage.src = imageUrl;
            patchContainer.style.display = "block"; // Make the patch visible instantly
        });
    </script>
</body>
</html>
