<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Center Patch Test</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            color: #fff;
        }
        model-viewer {
            width: 100vw;
            height: 82vh;
        }
        .controls {
            padding: 16px;
            text-align: center;
            background: #222;
        }
        input[type="file"] {
            color: #fff;
        }
        .slider-group {
            margin-top: 10px;
            display: inline-block;
            margin-right: 20px;
        }
    </style>
</head>
<body>

    <model-viewer
        id="viewer"
        src="MT_SHORTS.glb"
        alt="Patch test model"
        camera-controls
        auto-rotate
        rotation-per-second="-35deg"
        exposure="1.2"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls">
        <label for="patchUpload">Upload a transparent PNG patch:</label>
        <input type="file" id="patchUpload" accept="image/png">
        
        <br>
        <div class="slider-group">
            <label>Move Left/Right: </label>
            <input type="range" id="posXSlider" min="0" max="2048" value="1024">
        </div>
        <div class="slider-group">
            <label>Move Up/Down: </label>
            <input type="range" id="posYSlider" min="0" max="2048" value="1300">
        </div>
        <div class="slider-group">
            <label>Patch Scale: </label>
            <input type="range" id="scaleSlider" min="100" max="800" value="350">
        </div>
    </div>

    <script>
        const viewer = document.querySelector("#viewer");
        const fileInput = document.querySelector("#patchUpload");
        const posXSlider = document.querySelector("#posXSlider");
        const posYSlider = document.querySelector("#posYSlider");
        const scaleSlider = document.querySelector("#scaleSlider");

        let loadedImg = null;
        let originalTextures = new Map(); // Store original textures to prevent panels from vanishing

        async function updateTexture() {
            if (!loadedImg || !viewer.model) return;

            const canvasSize = 2048;
            const canvas = document.createElement("canvas");
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            const ctx = canvas.getContext("2d");

            // 1. Draw the uploaded image onto our clean canvas using the slider offsets
            const patchWidth = parseInt(scaleSlider.value);
            const patchHeight = patchWidth * (loadedImg.height / loadedImg.width);
            const posX = parseInt(posXSlider.value) - (patchWidth / 2);
            const posY = parseInt(posYSlider.value) - (patchHeight / 2); 

            ctx.drawImage(loadedImg, posX, posY, patchWidth, patchHeight);

            const dataUrl = canvas.toDataURL("image/png");
            const patchTexture = await viewer.createTexture(dataUrl);

            // 2. Target the main front fabric panels
            const frontPanels = ["FrontLeftPanel", "FrontRightPanel"];
            
            viewer.model.materials.forEach(material => {
                if (frontPanels.includes(material.name)) {
                    // Keep the fabric completely solid (NO MORE DISAPPEARING PANELS)
                    material.setAlphaMode("OPAQUE");

                    // Inject the user's logo directly into the texture layer
                    if (material.pbrMetallicRoughness.baseColorTexture) {
                        material.pbrMetallicRoughness.baseColorTexture.setTexture(patchTexture);
                    }
                }
            });
        }

        fileInput.addEventListener("change", async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (!viewer.model) {
                alert("Model hasn't finished loading yet!");
                return;
            }

            const imageUrl = URL.createObjectURL(file);
            loadedImg = await loadImage(imageUrl);
            
            updateTexture();
            URL.revokeObjectURL(imageUrl);
        });

        // Live slider listeners
        posXSlider.addEventListener("input", updateTexture);
        posYSlider.addEventListener("input", updateTexture);
        scaleSlider.addEventListener("input", updateTexture);

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = url;
            });
        }
    </script>
</body>
</html>
