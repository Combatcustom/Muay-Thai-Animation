<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Patch Test</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: sans-serif;
            color: #fff;
        }
        model-viewer {
            width: 100vw;
            height: 85vh;
        }
        .controls {
            padding: 16px;
            text-align: center;
        }
        input[type="file"] {
            color: #fff;
        }
    </style>
</head>
<body>

    <model-viewer
        id="viewer"
        src="MT_SHORTS.glb"
        alt="Patch test model"
        camera-controls
        auto-rotate
        rotation-per-second="-35deg"
        exposure="1.1"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls">
        <label for="patchUpload">Upload a transparent PNG to apply as a patch:</label><br>
        <input type="file" id="patchUpload" accept="image/png">
    </div>

    <script>
        const viewer = document.querySelector("#viewer");
        const fileInput = document.querySelector("#patchUpload");

        // Name of the mesh/material in your .glb that represents the raised patch panel.
        const PATCH_MATERIAL_NAME = "PatchSpace";

        fileInput.addEventListener("change", async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (!viewer.model) {
                alert("Model hasn't finished loading yet - try again in a moment.");
                return;
            }

            const imageUrl = URL.createObjectURL(file);
            const img = await loadImage(imageUrl);

            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            ctx.drawImage(img, 0, 0);

            const dataUrl = canvas.toDataURL("image/png");
            const texture = await viewer.createTexture(dataUrl);

            const patchMaterial = viewer.model.materials.find(m => m.name === PATCH_MATERIAL_NAME);
            if (!patchMaterial) {
                alert(`No material named "${PATCH_MATERIAL_NAME}" found on this model.`);
                return;
            }

            if (!patchMaterial.pbrMetallicRoughness.baseColorTexture) {
                patchMaterial.pbrMetallicRoughness.createTextureInfo();
            }

            patchMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
            patchMaterial.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);

            patchMaterial.setAlphaMode("MASK");
            patchMaterial.setAlphaCutoff(0.5); 

            URL.revokeObjectURL(imageUrl);
        });

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = url;
            });
        }
    </script>
</body>
</html>
